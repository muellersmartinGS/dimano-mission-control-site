name: Publish Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # deploy-pages fails transiently on this account; a fresh
      # attempt usually lands. One in-run retry after a pause.
      - id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.d1.outcome == 'failure'
        run: sleep 60
      - id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
